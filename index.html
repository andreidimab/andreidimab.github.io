<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrei Dimabuyo | Software Developer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111111;
      --bg2: #181818;
      --bg3: #1f1f1f;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-dim: #888888;
      --text-muted: #444444;
      --accent: #ffffff;
      --yellow: #d4a843;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(17,17,17,0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--text); }

    /* Layout */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    section {
      padding: 5.5rem 2rem;
      max-width: 860px;
      margin: 0 auto;
    }

    /* Hero */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 860px;
      margin: 0 auto;
      padding: 80px 2rem 0;
    }

    .hero-eyebrow {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
    }

    .hero-name {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 0.6rem;
    }

    .hero-role {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 400;
      color: var(--text-dim);
      margin-bottom: 1.6rem;
    }

    .hero-summary {
      font-size: 0.97rem;
      color: var(--text-dim);
      max-width: 520px;
      margin-bottom: 2.5rem;
      line-height: 1.85;
    }

    .hero-cta {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn {
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.65rem 1.4rem;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border: 1px solid var(--text);
    }

    .btn-primary:hover { background: #d0d0d0; border-color: #d0d0d0; }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .btn-secondary:hover { border-color: #555; color: var(--text); }

    /* Divider */
    hr { border: none; border-top: 1px solid var(--border); }

    /* Section headers */
    .section-header {
      margin-bottom: 2.5rem;
    }

    .section-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    /* About */
    .about-text {
      font-size: 0.97rem;
      color: var(--text-dim);
      line-height: 1.85;
      max-width: 640px;
    }

    /* Skills */
    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .skill-tag {
      font-size: 0.8rem;
      font-weight: 400;
      padding: 0.4rem 0.9rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      transition: all 0.15s;
    }

    .skill-tag:hover {
      border-color: #555;
      color: var(--text);
      background: var(--bg3);
    }

    /* Experience */
    .exp-list { display: flex; flex-direction: column; gap: 2.5rem; }

    .exp-item {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0 2rem;
    }

    .exp-meta { padding-top: 2px; }

    .exp-period {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .exp-role {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.15rem;
    }

    .exp-company {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 0.7rem;
    }

    .exp-desc {
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.75;
      margin-bottom: 0.8rem;
    }

    .exp-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .tool-tag {
      font-size: 0.72rem;
      padding: 0.2rem 0.55rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
    }

    /* Education */
    .edu-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.6rem 1.8rem;
    }

    .edu-degree {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .edu-school {
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 0.2rem;
    }

    .edu-year {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .edu-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.22rem 0.7rem;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    .badge-gold {
      background: rgba(212,168,67,0.1);
      border: 1px solid rgba(212,168,67,0.25);
      color: var(--yellow);
    }

    .badge-neutral {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    /* Projects */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    .project-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.6rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      transition: border-color 0.15s;
    }

    .project-card:hover { border-color: #444; }

    .project-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .project-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .project-link {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.15s;
      padding-top: 2px;
    }

    .project-link:hover { color: var(--text); }

    .project-company {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .project-desc {
      font-size: 0.87rem;
      color: var(--text-dim);
      line-height: 1.75;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: auto;
    }

    /* Contact */
    .contact-intro {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
      line-height: 1.8;
      max-width: 500px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 0.8rem;
    }

    .contact-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.1rem 1.3rem;
      text-decoration: none;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .contact-card:hover {
      border-color: #444;
      background: var(--bg3);
    }

    .contact-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .contact-value {
      font-size: 0.85rem;
      color: var(--text);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2.5rem 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Fade in */
    .fade-in {
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.15s; }
    .d3 { animation-delay: 0.25s; }
    .d4 { animation-delay: 0.35s; }
    .d5 { animation-delay: 0.45s; }

    /* Responsive */
    @media (max-width: 640px) {
      nav { padding: 0 1.2rem; }
      .nav-links { gap: 1.2rem; }
      section { padding: 4rem 1.2rem; }
      #hero { padding-left: 1.2rem; padding-right: 1.2rem; }
      .exp-item { grid-template-columns: 1fr; gap: 0.3rem; }
      .exp-meta { display: none; }
    }
  </style>
</head>

</html>
