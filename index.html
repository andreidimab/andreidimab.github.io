<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrei Dimabuyo | Software Developer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,300;1,14..32,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #111113;
      --surface2: #18181b;
      --border: #27272a;
      --border-light: #3f3f46;
      --text: #fafafa;
      --text-2: #a1a1aa;
      --text-3: #52525b;
      --accent: #f97316;
      --accent-dim: rgba(249,115,22,0.12);
      --accent-glow: rgba(249,115,22,0.2);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--accent); color: #000; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      padding: 0 max(2rem, calc((100vw - 1100px) / 2));
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(9,9,11,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(39,39,42,0.6);
    }

    .nav-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .nav-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin-left: 4px;
      margin-bottom: 1px;
      vertical-align: middle;
    }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-3);
      text-decoration: none;
      transition: color 0.15s;
      letter-spacing: 0.01em;
    }

    .nav-links a:hover { color: var(--text); }

    /* ─── LAYOUT ─── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    section {
      padding: 7rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ─── HERO ─── */
    #hero {
      min-height: 100svh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 56px 2rem 0;
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2.5rem;
    }

    .hero-available {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hero-available::before {
      content: '';
      display: block;
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(74,222,128,0.2);
      animation: pulse 2.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(74,222,128,0.2); }
      50% { box-shadow: 0 0 0 5px rgba(74,222,128,0); }
    }

    .hero-heading {
      font-size: clamp(3.2rem, 9vw, 7rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: var(--text);
    }

    .hero-heading em {
      font-style: italic;
      font-weight: 300;
      color: var(--text-2);
    }

    .hero-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .hero-summary {
      font-size: 0.97rem;
      color: var(--text-2);
      max-width: 400px;
      line-height: 1.8;
    }

    .hero-cta {
      display: flex;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .btn {
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent);
    }

    .btn-primary:hover {
      background: #ea6c0a;
      border-color: #ea6c0a;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    .btn-ghost:hover {
      border-color: var(--border-light);
      color: var(--text);
    }

    .hero-scroll {
      padding: 1.5rem 0;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .scroll-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .scroll-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ─── SECTION LABEL ─── */
    .sec-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 3rem;
    }

    .sec-num {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.1em;
      font-variant-numeric: tabular-nums;
    }

    .sec-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .sec-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── ABOUT ─── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .about-text {
      font-size: 1rem;
      color: var(--text-2);
      line-height: 1.9;
    }

    .about-text p + p { margin-top: 1.2rem; }

    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .stat-box {
      background: var(--surface);
      padding: 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
    }

    .stat-number span { color: var(--accent); }

    .stat-desc {
      font-size: 0.78rem;
      color: var(--text-3);
      font-weight: 400;
      line-height: 1.4;
    }

    /* ─── SKILLS ─── */
    .skills-categories {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .skill-group { display: flex; flex-direction: column; gap: 0.75rem; }

    .skill-group-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .skill-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pill {
      font-size: 0.82rem;
      font-weight: 400;
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-2);
      background: var(--surface);
      transition: all 0.15s;
      cursor: default;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .pill.featured {
      border-color: var(--border-light);
      color: var(--text);
      background: var(--surface2);
    }

    /* ─── EXPERIENCE ─── */
    .exp-items { display: flex; flex-direction: column; }

    .exp-item {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 2rem;
      padding: 2.5rem 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .exp-item:first-child { padding-top: 0; }
    .exp-item:last-child { border-bottom: none; padding-bottom: 0; }

    .exp-left { padding-top: 3px; }

    .exp-company {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .exp-period {
      font-size: 0.73rem;
      color: var(--text-3);
      line-height: 1.5;
    }

    .exp-role {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.7rem;
      letter-spacing: -0.01em;
    }

    .exp-desc {
      font-size: 0.88rem;
      color: var(--text-2);
      line-height: 1.78;
      margin-bottom: 1rem;
    }

    .pill-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .chip {
      font-size: 0.71rem;
      font-weight: 500;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-3);
      border: 1px solid var(--border);
    }

    /* ─── PROJECTS ─── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .project-card {
      background: var(--surface);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: background 0.15s;
      position: relative;
    }

    .project-card:hover { background: var(--surface2); }

    .project-card::before {
      content: '';
      position: absolute;
      top: 2rem; left: 0;
      width: 3px; height: 1.6rem;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .project-card:hover::before { opacity: 1; }

    .project-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .project-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .project-link {
      font-size: 0.8rem;
      color: var(--text-3);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
      flex-shrink: 0;
      padding: 0.25rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
    }

    .project-link:hover { color: var(--accent); border-color: var(--accent); }

    .project-from {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .project-desc {
      font-size: 0.875rem;
      color: var(--text-2);
      line-height: 1.75;
      flex: 1;
    }

    /* ─── EDUCATION ─── */
    .edu-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .edu-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      transition: border-color 0.15s;
    }

    .edu-card:hover { border-color: var(--border-light); }

    .edu-icon {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .edu-degree {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 0.3rem;
    }

    .edu-school {
      font-size: 0.82rem;
      color: var(--text-2);
      margin-bottom: 0.25rem;
    }

    .edu-year {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-bottom: 1.2rem;
    }

    .badges { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .badge {
      font-size: 0.71rem;
      font-weight: 500;
      padding: 0.22rem 0.65rem;
      border-radius: 100px;
    }

    .badge-gold {
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.25);
      color: #fbbf24;
    }

    .badge-slate {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    /* ─── CONTACT ─── */
    .contact-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .contact-headline {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    .contact-sub {
      font-size: 0.92rem;
      color: var(--text-2);
      line-height: 1.8;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .contact-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.15s;
      gap: 1rem;
    }

    .contact-link:hover {
      border-color: var(--border-light);
      background: var(--surface2);
    }

    .contact-link-left {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .cl-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .cl-value {
      font-size: 0.85rem;
      color: var(--text);
    }

    .cl-arrow {
      font-size: 0.9rem;
      color: var(--text-3);
      transition: transform 0.15s, color 0.15s;
    }

    .contact-link:hover .cl-arrow {
      transform: translate(2px, -2px);
      color: var(--accent);
    }

    /* ─── FOOTER ─── */
    footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .footer-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
    }

    .footer-copy {
      font-size: 0.75rem;
      color: var(--text-3);
    }

    /* ─── ANIMATIONS ─── */
    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      animation: fu 0.6s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes fu { to { opacity: 1; transform: none; } }
    .d0 { animation-delay: 0s; }
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.2s; }
    .d3 { animation-delay: 0.3s; }
    .d4 { animation-delay: 0.4s; }
    .d5 { animation-delay: 0.5s; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      nav { padding: 0 1.2rem; }
      .nav-links { gap: 1.2rem; }
      .nav-links li:nth-child(n+3) { display: none; }
      section { padding: 5rem 1.2rem; }
      #hero { padding: 56px 1.2rem 0; }
      .hero-heading { font-size: clamp(2.6rem, 11vw, 4rem); }
      .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .exp-item { grid-template-columns: 1fr; gap: 0.5rem; }
      .exp-left { display: flex; gap: 1rem; align-items: baseline; }
      .projects-grid { grid-template-columns: 1fr; }
      .edu-wrap { grid-template-columns: 1fr; }
      .contact-wrap { grid-template-columns: 1fr; gap: 2rem; }
      footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
